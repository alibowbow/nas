name: Deploy KOSPI night worker

# kospi-night-worker.js 가 main에 푸시되면 Cloudflare Worker로 자동 배포.
# (수동 Edit code 복붙 불필요)
#
# ── 1회 설정 ──────────────────────────────────────────────
# GitHub 저장소 → Settings → Secrets and variables → Actions → New repository secret
#   이름: CLOUDFLARE_API_TOKEN
#   값 : Cloudflare 대시보드 → My Profile → API Tokens → Create Token
#        → "Edit Cloudflare Workers" 템플릿으로 생성한 토큰
# (계정이 여러 개면 CLOUDFLARE_ACCOUNT_ID 시크릿도 추가)
# ─────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - 'kospi-night-worker.js'
      - 'wrangler.toml'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch: {}   # 수동 실행 버튼도 제공

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
